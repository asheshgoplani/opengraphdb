language = "C"
cpp_compat = true
include_guard = "OPENGRAPHDB_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen. Do not edit manually. */"
style = "tag"
usize_is_size_t = true

documentation = true

sys_includes = ["stdbool.h", "stdint.h"]

[parse]
parse_deps = false

[export]
include = [
  "OgdbHandle",
  "OGDB_INVALID_ID",
  "ogdb_last_error",
  "ogdb_init",
  "ogdb_open",
  "ogdb_close",
  "ogdb_create_node",
  "ogdb_add_edge",
  "ogdb_query",
  "ogdb_import",
  "ogdb_export",
  "ogdb_backup",
  "ogdb_checkpoint",
  "ogdb_metrics",
  "ogdb_free",
]
