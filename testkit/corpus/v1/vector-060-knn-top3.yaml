id: vector-060-knn-top3
description: |
  vector_search kNN parity — every surface must return the same top-k
  ids for a deterministic embedding fixture. Skipped on Phase-1 surfaces
  pending vector-index bring-up via the wire path; gate lifts in Phase 2.
tags: [vector, smoke]

skip:
  cli:
    reason: "vector-index wire bring-up tracked in Phase 2"
    issue: "testkit-harness-v1#phase2-vector"
  http:
    reason: "vector-index wire bring-up tracked in Phase 2"
    issue: "testkit-harness-v1#phase2-vector"

fixture: |
  CREATE (a:Doc {id: 'a', emb: [1.0, 0.0, 0.0]});
  CREATE (b:Doc {id: 'b', emb: [0.9, 0.1, 0.0]});
  CREATE (c:Doc {id: 'c', emb: [0.0, 1.0, 0.0]})

cypher: |
  CALL vector_search('Doc', 'emb', [1.0, 0.0, 0.0], 3) YIELD node, score
  RETURN node.id AS id ORDER BY score DESC

expect:
  ordered: true
  columns: [id]
  rows:
    - ["a"]
    - ["b"]
    - ["c"]
