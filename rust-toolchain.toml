# EVAL-RUST-QUALITY-CYCLE3 H11: pin the toolchain so `dtolnay/rust-toolchain`
# CI actions, local `rustup`, and any direnv/asdf integration all converge
# on the same compiler. Move this file in lockstep with the workspace
# `rust-version` field in /Cargo.toml — both pins describe the same MSRV
# policy. Components are intentionally NOT listed here: GitHub Actions
# runners pre-install rustfmt + clippy via dtolnay/rust-toolchain, and
# explicitly listing them here triggers rustup to re-install and fails
# with "detected conflict: bin/cargo-clippy". Local users without a
# pre-installed toolchain can `rustup component add rustfmt clippy
# llvm-tools-preview` after this file resolves the channel.
[toolchain]
channel = "1.88.0"
profile = "minimal"
