# EVAL-RUST-QUALITY-CYCLE3 H11: pin the toolchain channel only. Components
# (rustfmt, clippy, llvm-tools-preview) are installed via CI action calls or
# explicit `rustup component add ...`, NOT from toolchain.toml — listing them
# here triggers `rustup` to re-install on every cargo invocation, which
# fails on GitHub Actions runners with "detected conflict: bin/cargo-clippy"
# because dtolnay/rust-toolchain has already pre-installed them.
[toolchain]
channel = "1.88.0"
profile = "minimal"
