[graph]
targets = []
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
ignore = [
    { id = "RUSTSEC-2025-0020", reason = "pyo3 0.21 PyString::from_object — deferred; pyo3 0.24 is a major API migration tracked as separate follow-up. Feature-gated (python not in default features)." },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "BlueOak-1.0.0",
    "0BSD",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = [
    { allow = ["zlib-acknowledgement"], crate = "fastdivide" },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
