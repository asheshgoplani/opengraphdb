# OpenGraphDB — Release Regression Test Manifest
#
# This file lists every test that was added to fix a specific bug. Every release
# cut (phase 8 of the conductor's 8-phase TDD pipeline) MUST run all tests below
# and go green before the tag + GitHub release is published.
#
# Manifest-source drift is a failure: if a test named here doesn't exist or fails
# to compile, that's worse than no manifest — the CI release gate depends on this
# file being honest.
#
# Bootstrapped 2026-04-19 as part of fix/write-perf. Append new entries for every
# future bug fix (invariant 3 of the claude-conductor skill).
#
# Schema:
#   tests:
#     - id:       short-kebab-id unique across the file
#       task:     fix-<task-id> that added this regression guard
#       crate:    which cargo workspace crate the test lives in
#       test:     the rust test target name (matches --test flag)
#       function: the specific #[test] function name(s); empty list means all in file
#       command:  exact cargo invocation to run just this test
#       purpose:  one-line description of what this guards against
#       added:    YYYY-MM-DD

tests:
  - id: write-perf-single-op-under-2ms
    task: fix-write-perf
    crate: ogdb-core
    test: write_perf_single_op_under_2ms
    function: [single_create_node_p50_under_2ms]
    command: "cargo test --release -p ogdb-core --test write_perf_single_op_under_2ms"
    purpose: "Guards against sync_meta-per-op regression. Asserts p50 create_node latency under 2ms."
    added: 2026-04-19

  - id: write-perf-1k-under-1s
    task: fix-write-perf
    crate: ogdb-core
    test: write_perf_1k_under_1s
    function: []
    command: "cargo test --release -p ogdb-core --test write_perf_1k_under_1s"
    purpose: "Asserts bulk 1K-node insert completes in <1s. Direct coverage of the 10K-import perf story."
    added: 2026-04-19

  - id: meta-json-no-growth-on-writes
    task: fix-write-perf
