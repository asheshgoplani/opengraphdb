    purpose: "Guards audit findings 1.1 + 1.2 — ActiveSnapshotRegistry::{register,unregister,min_active_snapshot_txn_id} and Database::{lock_buffer_pool,lock_free_list} must return DbError::Corrupt on poisoned mutexes instead of panicking. ReadSnapshot::drop must swallow the error (never panic in Drop)."
