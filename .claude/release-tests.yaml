    added: 2026-04-23

  - id: proptest-atomicity-mvcc-invariants
    task: test-proptest-atomicity
    crate: ogdb-core
    test: proptest_atomicity
    function: [commit_all_or_nothing, wal_replay_idempotent, read_snapshot_consistency, mvcc_version_monotonic]
    command: "cargo test -p ogdb-core --test proptest_atomicity"
    purpose: "Property-based invariants (256 cases each, shrinking enabled) guarding the commit/rollback/WAL/MVCC kernel: (1) post-tx state is strictly pre-tx snapshot or fully applied — never partial, (2) two drop+reopen cycles on the WAL-durable op subset yield byte-identical state, (3) every post-commit ReadTransaction is internally consistent (label/prop reads succeed, edge endpoints within node_count, snapshot_txn_id non-decreasing), (4) txn_id strictly monotonic across commits and ReadTransaction::snapshot_txn_id >= committed txn_id. Catches atomicity / durability / isolation regressions in any future core refactor."
    added: 2026-04-23

