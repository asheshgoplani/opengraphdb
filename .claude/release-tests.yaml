    purpose: "Asserts DiffEngine emits REGRESSION / IMPROVEMENT events at the per-metric thresholds (5% throughput / 10% p99 latency / 3% NDCG / 20% TTI). Core of the closed-loop."
    added: 2026-04-20

  - id: evaluator-history-append
