# OpenGraphDB — Release Regression Test Manifest
#
# This file lists every test that was added to fix a specific bug. Every release
# cut (phase 8 of the conductor's 8-phase TDD pipeline) MUST run all tests below
# and go green before the tag + GitHub release is published.
#
# Manifest-source drift is a failure: if a test named here doesn't exist or fails
# to compile, that's worse than no manifest — the CI release gate depends on this
# file being honest.
#
# Bootstrapped 2026-04-19 as part of fix/write-perf. Append new entries for every
# future bug fix (invariant 3 of the claude-conductor skill).
#
# Schema:
#   tests:
#     - id:       short-kebab-id unique across the file
#       task:     fix-<task-id> that added this regression guard
#       crate:    which cargo workspace crate the test lives in
#       test:     the rust test target name (matches --test flag)
#       function: the specific #[test] function name(s); empty list means all in file
#       command:  exact cargo invocation to run just this test
#       purpose:  one-line description of what this guards against
#       added:    YYYY-MM-DD

tests:
  - id: write-perf-single-op-under-2ms
    task: fix-write-perf
    crate: ogdb-core
    test: write_perf_single_op_under_2ms
    function: [single_create_node_p50_under_2ms]
    command: "cargo test --release -p ogdb-core --test write_perf_single_op_under_2ms"
    purpose: "Guards against sync_meta-per-op regression. Asserts p50 create_node latency under 2ms."
    added: 2026-04-19

  - id: write-perf-1k-under-1s
    task: fix-write-perf
    crate: ogdb-core
    test: write_perf_1k_under_1s
    function: []
    command: "cargo test --release -p ogdb-core --test write_perf_1k_under_1s"
    purpose: "Asserts bulk 1K-node insert completes in <1s. Direct coverage of the 10K-import perf story."
    added: 2026-04-19

  - id: meta-json-no-growth-on-writes
    task: fix-write-perf
    crate: ogdb-core
    test: meta_json_no_growth_on_writes
    function: []
    command: "cargo test --release -p ogdb-core --test meta_json_no_growth_on_writes"
    purpose: "Asserts meta.json on-disk size does not grow O(N) with write load. Catches reintroduction of per-op sidecar rewrites."
    added: 2026-04-19

  - id: wal-replay-preserves-committed-labels
    task: fix-write-perf
    crate: ogdb-core
    test: wal_replay_preserves_committed_labels_across_simulated_power_loss
    function: []
    command: "cargo test --release -p ogdb-core --test wal_replay_preserves_committed_labels_across_simulated_power_loss"
    purpose: "Codifies the post-deferred-sync durability contract (graceful close + WAL replay preserves committed data)."
    added: 2026-04-19

  - id: write-throughput-regression
    task: fix-write-perf
    crate: ogdb-bench
    test: write_throughput_regression
    function: [create_nodes_throughput_above_10k_elems_per_sec]
    command: "cargo test --release -p ogdb-bench --test write_throughput_regression"
    purpose: "Asserts create_nodes throughput >=7500 elem/s post-fix (235x baseline). Threshold calibrated against ext4 6ms fsync floor; see .planning/fix-write-perf/PLAN.md D7."
    added: 2026-04-19

  - id: demo-datasets-canonical-names
    task: fix-demo-seed
    crate: ogdb-cli
    test: demo_datasets_seed
    function: [datasets_fixture_canonical_names_smoke_test]
    command: "cargo test --release -p ogdb-cli --test demo_datasets_seed"
    purpose: "Bidirectional smoke guard — asserts datasets/ contains the current canonical set (movielens/airroutes/got/wikidata) and does NOT contain the deleted Phase-06 fixtures. Catches re-drift in either direction."
    added: 2026-04-19

  - id: wcoj-two-expand-chain-under-30s
    task: fix-wcoj-deadlock
    crate: ogdb-core
    test: lib
    function: [wcoj_two_expand_chain_completes_under_30s_guard]
    command: "cargo test --release -p ogdb-core --lib wcoj_two_expand_chain_completes_under_30s_guard"
    purpose: "Defensive regression guard — WCOJ planning+execution on the symmetric two-expand-chain fixture must complete in <30s. Catches future deadlocks or runaway recursion in the planner or executor."
    added: 2026-04-20

  - id: wcoj-cost-comparison-under-5s
    task: fix-wcoj-deadlock
    crate: ogdb-core
    test: lib
    function: [wcoj_cost_comparison_two_expand_chain_terminates_under_5s]
    command: "cargo test --release -p ogdb-core --lib wcoj_cost_comparison_two_expand_chain_terminates_under_5s"
    purpose: "Isolated cost-function guard — detect_wcoj_candidate + estimate_wcoj_cost + estimate_binary_chain_cost must terminate in <5s with finite costs and WCOJ strictly beating binary-chain on the fixture."
    added: 2026-04-20

  - id: evaluator-schema-roundtrip
    task: evaluator-harness
    crate: ogdb-eval
    test: schema_roundtrip
    function: []
    command: "cargo test --release -p ogdb-eval --test schema_roundtrip"
    purpose: "Asserts EvaluationRun serde roundtrip preserves all fields and enforces schema_version for forward-compat."
    added: 2026-04-20

  - id: evaluator-diff-engine
    task: evaluator-harness
    crate: ogdb-eval
    test: diff_engine
    function: []
    command: "cargo test --release -p ogdb-eval --test diff_engine"
    purpose: "Asserts DiffEngine emits REGRESSION / IMPROVEMENT events at the per-metric thresholds (5% throughput / 10% p99 latency / 3% NDCG / 20% TTI). Core of the closed-loop."
    added: 2026-04-20

  - id: evaluator-history-append
    task: evaluator-harness
    crate: ogdb-eval
    test: history_append
    function: []
    command: "cargo test --release -p ogdb-eval --test history_append"
    purpose: "Asserts JsonlHistory is append-only, readable even if an entry is truncated, and preserves insertion order."
    added: 2026-04-20

  - id: evaluator-ldbc-submission
    task: evaluator-harness
    crate: ogdb-eval
    test: ldbc_submission
    function: []
    command: "cargo test --release -p ogdb-eval --test ldbc_submission"
    purpose: "Asserts the LDBC-submission exporter emits a format compatible with LDBC audit submission rules (so OpenGraphDB numbers can later be published vs Neo4j/Memgraph/Nebula)."
    added: 2026-04-20

  # Slice R3 removals (2026-04-22): the Semantic, Temporal, and MCP playground
  # tabs could not be demonstrated end-to-end against `ogdb serve --http` with
  # the endpoints that exist today — no backend /mcp/invoke, /query?as_of, or
  # vector/FTS routes. Per the ruthless-trim policy in PLAN reposition R3, the
  # tabs and their specs (playground-mcp-gallery-e2e, playground-semantic-search-e2e,
  # playground-temporal-slider-e2e, mcp-honest-preview-e2e) were deleted rather
  # than kept as fake-runtime proofs. Add them back the moment the backend
  # exposes those endpoints and we can prove them for real.

  - id: playground-schema-browser-e2e
    task: playground-premium
    crate: frontend
    test: e2e/schema-browser
    function: []
    command: "cd frontend && npx playwright test e2e/schema-browser.spec.ts"
    purpose: "Playwright e2e — SchemaBrowser tree renders labels + edges + properties; RDFDropzone accepts ttl drop; ontology mode toggles size boost on owl:Class nodes."
    added: 2026-04-20

  - id: playground-polish-cohesion-e2e
    task: playground-premium
    crate: frontend
    test: e2e/polish-cohesion
    function: []
    command: "cd frontend && npx playwright test e2e/polish-cohesion.spec.ts"
    purpose: "Playwright e2e — panel mounts use shared framer-motion preset; all panels have designed empty/loading/error states; Fraunces+Inter typography cohesion; mobile responsive."
    added: 2026-04-20

  - id: claims-power-tab-real-cypher-e2e
    task: reposition-r3
    crate: frontend
    test: e2e/claims/power-tab-real-cypher
    function: []
    command: "cd frontend && npx playwright test e2e/claims/power-tab-real-cypher.spec.ts"
    purpose: "Playwright e2e against real ogdb serve — Power mode executes MATCH (n) RETURN n LIMIT 10 through /api/query; QueryResultTable renders rows returned by the Rust engine; malformed Cypher surfaces a visible error. Guards against the Power-tab claim drifting back into client-side-only rendering."
    added: 2026-04-22

  - id: claims-schema-tab-real-backend-e2e
    task: reposition-r3
    crate: frontend
    test: e2e/claims/schema-tab-real-backend
    function: []
    command: "cd frontend && npx playwright test e2e/claims/schema-tab-real-backend.spec.ts"
    purpose: "Playwright e2e against real ogdb serve — BackendSchemaStrip fires GET /api/schema on mount and renders labels+edge_types+property_keys counts that match the backend response; stubbed 500 surfaces a visible error state. Guards against silent fallback / client-side-only schema reporting."
    added: 2026-04-22

  - id: cosmos-canvas-renders-e2e
    task: fix-cosmos-canvas-race
    crate: frontend
    test: e2e/playground-canvas-renders
    function: []
    command: "cd frontend && xvfb-run -a npx playwright test e2e/playground-canvas-renders.spec.ts"
    purpose: "Playwright pixel-asserting e2e — /playground graph canvas paints non-background pixels in its center region within 3 seconds of load. Guards against the fitView/setPointPositions race that left the canvas black for 14+ seconds."
    added: 2026-04-21

  - id: rdf-import-real-e2e
    task: fix-rdf-import-fake
    crate: frontend
    test: e2e/rdf-import-real
    function: []
    command: "cd frontend && npx playwright test e2e/rdf-import-real.spec.ts"
    purpose: "Playwright e2e — drag a .ttl onto RDFDropzone, POST hits ogdb serve /rdf/import, returned db_path is readable + totals match. Guards against the silent in-browser-only parse regression."
    added: 2026-04-21

  - id: premium-graph-quality-e2e
    task: ux-slice10-premium-graph
    crate: frontend
    test: e2e/premium-graph-quality
    function: []
    command: "cd frontend && xvfb-run -a npx playwright test e2e/premium-graph-quality.spec.ts"
    purpose: "Playwright pixel-asserting e2e — four strict premium-ness gates on /playground?dataset=community: visible edges, visible labels, center+corner density spread, multi-bucket color variety. Guards against slice-9-style monochrome clumped canvases."
    added: 2026-04-21

  - id: http-cors-backend
    task: fix-cors-backend
    crate: ogdb-cli
    test: http_cors
    function: [http_response_carries_cors_headers_for_cross_origin_get, http_options_preflight_returns_204_with_full_cors_headers]
    command: "cargo test -p ogdb-cli --test http_cors"
    purpose: "Guards CRITICAL FIX #1 from the 2026-04-22 playground correctness audit — ogdb serve --http must emit Access-Control-Allow-Origin/Methods/Headers on every response and return 204 + full preflight triplet on OPTIONS. Catches re-drift that would break Live Mode / Power Mode / BackendSchemaStrip with 'Failed to fetch' from non-same-origin playgrounds."
    added: 2026-04-22
