name: testkit

# Phase 1 of the TestKit rollout (see testkit/README.md). This workflow is
# NOT a required check yet — it runs nightly + on-demand during a 2-week
# soak; the status check flips to required on `main` after soak.

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity:
    name: cross-binding parity
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: testkit-release-cli

      - name: Build ogdb CLI (release)
        run: cargo build --release -p ogdb-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Run TestKit corpus (cli + http)
        working-directory: testkit
        env:
          OGDB_BIN: ${{ github.workspace }}/target/release/ogdb
        run: |
          python3 driver/run_corpus.py \
            --surfaces cli,http \
            --corpus corpus/v1/ \
            | tee /tmp/testkit-run.log
          # Phase 1: soft exit (driver returns 0 even on parity drift).
          # Phase 2 flips this to --strict and gates merges.

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testkit-run-log
          path: /tmp/testkit-run.log
          retention-days: 14
