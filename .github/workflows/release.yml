name: Release

# EVAL-PERF-RELEASE.md Findings 4 / 5 / 6 (BLOCKER): on `v*` tag push,
# build the cross-platform matrix (linux x86_64/aarch64, macOS x86_64/aarch64,
# windows x86_64), package each as ogdb-<version>-<target>.{tar.xz,zip}, and
# upload to the auto-created GitHub Release. This replaces the prior
# "no release pipeline" state called out in the eval.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# C3-H4 (HIGH): serialise per-tag release runs. Two parallel runs of the
# same vX.Y.Z (push-then-push, or `gh workflow run` racing a tag-trigger)
# both call `cargo publish` — the second hits "already exists" and aborts
# the chain mid-fan-out, leaving a partial publish. Queue the second run
# instead of cancelling so the first finishes cleanly.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        # EVAL-RUST-QUALITY-CYCLE3 H11: pin to MSRV so a re-run on an old
        # tag regenerates byte-identical binaries (modulo deterministic
        # builds; see release artifact provenance).
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA dist for include_dir!
        working-directory: frontend
        # C2-A3 (BLOCKER): mirror the ci.yml fix from `91d26f2` — macOS
        # (and especially aarch64-apple-darwin) runners OOM under v8's
        # default heap when vite builds. Without this env, every macOS +
        # Windows build in the matrix fails before reaching cargo,
        # leaving a "successful" Release with only Linux binaries.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build:app

      - name: Install cross (linux aarch64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release archive (unix)
        if: runner.os != 'Windows'
        env:
          OGDB_SKIP_FRONTEND: "1"
        run: bash scripts/release.sh ${{ matrix.target }}

      - name: Build release archive (windows)
        if: runner.os == 'Windows'
        env:
          OGDB_SKIP_FRONTEND: "1"
        shell: bash
        run: bash scripts/release.sh ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ogdb-${{ matrix.target }}
          path: dist/ogdb-*

  checksums:
    # C2-B2 (HIGH): emit SHA256SUMS.txt alongside binaries so users have a
    # way to verify download integrity. Standard pattern across cargo-dist,
    # GoReleaser, and `curl | bash` installers — without it the planned
    # one-line installer has no integrity check.
    name: generate sha256sums
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256SUMS.txt
        run: |
          cd dist
          sha256sum ogdb-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/SHA256SUMS.txt

  release:
    name: publish github release
    needs: [build, checksums]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # C2-B2: SHA256SUMS.txt is downloaded with the artifacts above
          # via merge-multiple, so the glob picks it up.
          files: |
            dist/ogdb-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
          # C2-B1 (HIGH): always publish as draft so a bad RC doesn't
          # auto-promote and hide the previous "Latest" release. Detect
          # pre-release tags from the standard `vX.Y.Z-rc1` shape so the
          # GitHub UI badges them correctly when the maintainer flips
          # `draft=false` via `gh release edit`.
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-crates:
    # EVAL-RUST-QUALITY-CYCLE2 B3 (BLOCKER): Cycle 1 added all the publishable
    # metadata for crates.io (description / repository / keywords / categories
    # via `[workspace.package]` inheritance), but no workflow ever ran
    # `cargo publish`. The metadata invariant only matters if the workspace
    # actually publishes; otherwise the gate exists for a purpose never
    # realised, and the first real publish-from-tag will hit ordering issues.
    #
    # The order below respects the dep DAG (leaf crates first); the 30s
    # `sleep` lets crates.io's index settle before the next dependency
    # picks up the new version.
    name: cargo publish
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      # EVAL-RUST-QUALITY-CYCLE3 H11: pin the publish job's toolchain too —
      # `cargo publish` runs `cargo build` under the hood, and a drift
      # between the build job and the publish job would surface as silently
      # different artifacts.
      - uses: dtolnay/rust-toolchain@1.88.0
      # C4-H1 (HIGH): without these two Node + SPA-build steps, `cargo
      # publish -p ogdb-cli` ran on a tree with an empty
      # `frontend/dist-app/`. `include_dir!` tolerates a missing directory
      # by emitting an empty `Dir`, so the publish *succeeded* but shipped
      # a binary whose `static_assets::index_html()` returns `None` and
      # whose UI routes serve the "SPA missing" stub. Mirror the SPA-build
      # contract from the `build` job (lines 59-77) so the crates.io
      # artefact and the GitHub-Release archive are bit-equivalent.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA dist for include_dir!
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build:app
      # C3-H1 (HIGH): dry-run smoke before the real fan-out. If a path-dep
      # version pin regressed (cf C3-B1), `cargo publish --dry-run` surfaces
      # it on the cheap leaf crates before any real upload happens — without
      # this the first failure stranded the release mid-fan-out.
      #
      # Note: `cargo publish --dry-run` requires every transitive workspace
      # path-dep to be resolvable from crates.io OR carry a path+version
      # spec. It is reliable from v0.5.0 onward (once any ogdb-*@0.4.0 is
      # on the index). For the first-ever publish, the structural lint
      # `scripts/test-crate-metadata.sh` is the load-bearing gate; the
      # dry-run loop is best-effort and does not exit non-zero so a
      # bootstrap publish is still possible.
      - name: cargo publish (dry-run smoke)
        run: |
          set +e
          for crate in ogdb-vector \
                       ogdb-types \
                       ogdb-text \
                       ogdb-temporal \
                       ogdb-algorithms \
                       ogdb-export \
                       ogdb-import \
                       ogdb-core \
                       ogdb-bolt \
                       ogdb-cli \
                       ogdb-ffi \
                       ogdb-node \
                       ogdb-python; do
            echo "::group::dry-run $crate"
            cargo publish -p "$crate" --dry-run --allow-dirty \
              || echo "WARN: $crate dry-run failed (bootstrap publish, or transitive dep not yet on crates.io)"
            echo "::endgroup::"
          done

      # C3-H1 (HIGH): real publish, with a skip-already-published guard so
      # re-tagging or fixup-tagging the same version does not strand the
      # fan-out. If `ogdb-vector@0.4.0` is already on crates.io,
      # `cargo publish` exits non-zero — without the guard the chain breaks
      # there and `ogdb-types` onward never publish, leaving a partial
      # release that needs manual `cargo yank`.
      - name: Publish each crate in dep order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: |
          set -euo pipefail
          WS_VERSION=$(awk '/^\[workspace\.package\]/{b=1;next} /^\[/{b=0} b&&/^[[:space:]]*version[[:space:]]*=/{match($0,/"[^"]+"/);print substr($0,RSTART+1,RLENGTH-2);exit}' Cargo.toml)
          echo "workspace version: $WS_VERSION"
          for crate in ogdb-vector \
                       ogdb-types \
                       ogdb-text \
                       ogdb-temporal \
                       ogdb-algorithms \
                       ogdb-export \
                       ogdb-import \
                       ogdb-core \
                       ogdb-bolt \
                       ogdb-cli \
                       ogdb-ffi \
                       ogdb-node \
                       ogdb-python; do
            echo "::group::cargo publish -p $crate"
            # Idempotency check: if the index already serves this exact
            # (crate, version), skip and move on. `cargo search` is cheap
            # and does not require a token.
            if cargo search "$crate" --limit 1 2>/dev/null \
                 | grep -qE "^${crate} = \"${WS_VERSION}\""; then
              echo "skip: ${crate}@${WS_VERSION} already on crates.io"
              echo "::endgroup::"
              continue
            fi
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
            echo "::endgroup::"
            sleep 30
          done

  docker:
    # EVAL-PERF-RELEASE.md Finding 9 (HIGH): build + push the distroless
    # Docker image to ghcr.io on every v* tag so `ogdb serve --http` users
    # can `docker pull ghcr.io/asheshgoplani/opengraphdb:vX.Y.Z`.
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # C2-B4 (HIGH): the binary release matrix already covers
      # aarch64-unknown-linux-gnu, but the docker job emitted an amd64-only
      # image. AWS Graviton + Apple Silicon users (under emulation) had no
      # native arm64 image. QEMU + buildx multi-platform fixes that.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # C2-B4: build linux/amd64 + linux/arm64 in one buildx invocation;
          # the resulting manifest list lets `docker pull` auto-pick the
          # right arch on Graviton / Apple Silicon hosts.
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/opengraphdb:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/opengraphdb:latest
