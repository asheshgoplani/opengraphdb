name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        # EVAL-RUST-QUALITY-CYCLE3 H11: pin to the workspace MSRV so a
        # `dtolnay/rust-toolchain@stable` re-run on an old PR does not
        # silently drift across rustc versions. Bump in lockstep with
        # /Cargo.toml `rust-version` and /rust-toolchain.toml.
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Setup Node
        # Slice S7 (.planning/frontend-overhaul/PLAN.md) embeds the built SPA
        # into the ogdb binary via `include_dir!`. The macro reads
        # `frontend/dist-app/` at compile time, so cargo cannot build the
        # workspace until the SPA has been built. `frontend/dist-app/` is
        # gitignored, so we always rebuild it here.
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build SPA dist for include_dir!
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build:app

      - name: Install coverage tooling
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: BENCHMARKS.md version-match gate (eval Finding 1)
        run: bash scripts/check-benchmarks-version.sh

      # C2-A8 (HIGH): the structural lint scripts (test-crate-metadata,
      # test-release-workflow, test-dockerfile, test-check-benchmarks-version)
      # are now driven by `scripts/test.sh`. Don't double-run them here.
      - name: Run test workflow
        run: ./scripts/test.sh

      # EVAL-RUST-QUALITY-CYCLE4 H4: dual-pin doctest execution. scripts/test.sh
      # already runs `cargo test --workspace --doc`; surface it as a discrete CI
      # step so a failure points at doctests directly instead of being buried
      # in the larger test workflow log.
      - name: Run doctests
        run: cargo test --workspace --doc

      - name: Run coverage gate
        run: ./scripts/coverage.sh

  frontend-quality:
    # EVAL-FRONTEND-QUALITY-CYCLE2.md BLOCKER-1: prior job ran only the
    # token-leak script, leaving lint/tsc/vitest/test:unit/build ungated. A
    # green CI on this job must mean the SPA builds, types check, lints
    # cleanly with zero warnings, and unit + vitest suites pass.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Typecheck
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Vitest
        run: npm run test:vitest

      - name: Token-leak gate
        run: bash scripts/check-token-leaks.sh

      - name: Build (matches release)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

  e2e:
    # EVAL-FRONTEND-QUALITY-CYCLE3.md H-1: cycle-2 restored lint/tsc/vitest
    # but left the playwright e2e suite ungated. The e2e specs (axe-core
    # a11y sweep, mobile overflow pin, SEO pin, AI integration card pin,
    # 25+ product specs) only ran locally before this job. A failure mode
    # on those would be silent until the next manual `npm run test:e2e`.
    # Run on a separate job parallel to `frontend-quality` so the slow
    # browser install doesn't block the lint/tsc signal.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  msrv:
    # EVAL-RUST-QUALITY-CYCLE2 B4 (BLOCKER): root Cargo.toml declares
    # `rust-version = "1.88"` but every other CI job uses
    # `dtolnay/rust-toolchain@stable`. A dependency upgrade can quietly
    # pull a feature requiring a newer toolchain and CI passes; the next
    # user installing against 1.88 hits a build error. Lock the toolchain
    # to the declared MSRV here so a regression fails the PR.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust 1.88 (workspace MSRV)
        # EVAL-RUST-QUALITY-CYCLE3 H11: pin to a fully-qualified version
        # so re-runs of older PRs are deterministic.
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Setup Node
        # `include_dir!` reads `frontend/dist-app/` at compile time, so the
        # SPA build is a prerequisite even on the MSRV-only check.
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA dist for include_dir!
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build:app

      - name: cargo check against MSRV
        run: cargo check --workspace --all-features

  semver:
    # EVAL-RUST-QUALITY-CYCLE3 B4 (BLOCKER) → CYCLE4 B1 (BLOCKER): the
    # workspace ships v0.4.0 to crates.io. Without cargo-semver-checks,
    # an accidental breaking change to a #[non_exhaustive] enum, a
    # method's signature, or a removed pub item slips through CI and
    # breaks every downstream `cargo add ogdb-core@^0.4`. Cycle 3 wired
    # the gate but kept `|| echo` advisory swallow; cycle 4 drops the
    # swallow now that the baseline is clean — a non-zero exit fails
    # CI, so a real semver regression demands a fix or a major bump.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Setup Node
        # ogdb-cli `include_dir!` requires the SPA build for cargo to even
        # begin compiling — semver-checks runs `cargo build` under the hood.
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA dist for include_dir!
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build:app

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked --version 0.44.0

      - name: cargo semver-checks check-release
        run: |
          set -euo pipefail
          for crate in ogdb-types ogdb-vector ogdb-text ogdb-temporal \
                       ogdb-algorithms ogdb-import ogdb-export \
                       ogdb-core ogdb-bolt ogdb-cli; do
            cargo semver-checks check-release -p "$crate"
          done

  cross-platform-build:
    # EVAL-PERF-RELEASE.md Finding 6 (BLOCKER): catch macOS / Windows
    # breakage on the PR, not at the v* tag. We build ogdb-cli only — full
    # `cargo test` on macOS/Windows would gate every PR on a 30-min job;
    # this slim build verifies the platform compiles. The full release
    # workflow (.github/workflows/release.yml) does the cross-target build
    # matrix on tag push.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        # EVAL-RUST-QUALITY-CYCLE3 H11: pin to MSRV across every CI job
        # so cross-platform behavior cannot drift between platforms.
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA dist for include_dir!
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build:app

      - name: Build ogdb-cli (release)
        run: cargo build --release -p ogdb-cli

  bench-regression:
    # C4-H2 (HIGH): the C3-H3 patch added the Criterion harness file
    # (`crates/ogdb-bench/benches/throughput_benches.rs`) but never
    # wired it into CI, so the exact failure mode C3-H3 was meant to
    # close — *"a tested, merged perf fix can be silently reverted by
    # a bad merge and stay invisible until the next manual
    # `publish_baseline` run"* — stayed open. This job benches the
    # PR's HEAD and `main`, then fails if any throughput row is more
    # than 25 % slower on the PR side.
    #
    # Threshold rationale: ubuntu-latest has a noise floor near ~10 %
    # for cargo-bench micro-benchmarks. 25 % is the cheap stop-gap
    # that catches the worst regressions without false-positiving on
    # noise. Tighten when a self-hosted perf runner is available.
    #
    # Only runs on pull_request — there is no `main` baseline to
    # compare against on push-to-main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Setup Node
        # ogdb-bench depends on ogdb-eval -> ogdb-core (no `include_dir!`
        # on those), but a transitive workspace build can still pull
        # ogdb-cli; build the SPA so cargo never trips on a missing
        # `frontend/dist-app/`.
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA dist for include_dir!
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build:app

      - name: Cache target/
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-regression

      - name: Install critcmp
        uses: taiki-e/install-action@v2
        with:
          tool: critcmp

      - name: Bench (PR HEAD)
        run: |
          cargo bench -p ogdb-bench --bench throughput_benches -- \
            --save-baseline pr

      - name: Checkout main
        run: |
          git fetch origin main:main
          git checkout main

      - name: Bench (main)
        run: |
          cargo bench -p ogdb-bench --bench throughput_benches -- \
            --save-baseline main

      - name: Compare baselines (fail on > 25 % regression)
        run: |
          set -euo pipefail
          critcmp main pr | tee bench-delta.txt
          # critcmp output has the shape:
          #   group   main                  pr
          #   foo     1.00     5.4±0.0ms    1.05     5.7±0.0ms
          # where column $4 is the PR ratio relative to the fastest
          # baseline. A PR ratio > 1.25 means the PR side is at least
          # 25 % slower than main on that row.
          awk '
            /^group[[:space:]]/ { next }
            /^-----/ { next }
            NF >= 4 && $2 ~ /^[0-9]+\.[0-9]+$/ && $4 ~ /^[0-9]+\.[0-9]+$/ {
              if ($4+0 > 1.25) {
                printf("REGRESSION: %s pr-ratio=%s (>1.25)\n", $1, $4) > "/dev/stderr"
                fail = 1
              }
            }
            END { exit fail }
          ' bench-delta.txt
